name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest

    

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Free disk space
        run: |
          echo "=== Espacio antes ==="
          df -h

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

          docker system prune -af || true

          echo "=== Espacio después ==="
          df -h
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/PythIA/docker/requirements_docker.txt

      - name: Run tests with coverage
        working-directory: app/PythIA
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          PYTHONPATH: ${{ github.workspace }}/app/PythIA
          DATABASE_URL: "sqlite:///:memory:"
          QDRANT_URL: http://localhost:6333
        run: |
          python -m coverage run --source=app/main -m unittest discover -s app/test -t .
          python -m coverage xml -o coverage.xml
          python -m coverage report -m

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
