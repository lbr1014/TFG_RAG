services:
  db:
    image: postgres:16
    container_name: flask_db
    env_file:
      - .env
      - secret.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      TZ: Europe/Madrid
      PGTZ: Europe/Madrid
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:${POSTGRES_PORT}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: flask_qdrant
    expose:
      - "${QDRANT_INTERNAL_PORT}"
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: flask_ollama
    gpus: all
    ports:
      - "${OLLAMA_EXTERNAL_PORT}:${OLLAMA_INTERNAL_PORT}"
    volumes:
      - ollama:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-lc", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ${OLLAMA_SERVICE_HOST}:${OLLAMA_INTERNAL_PORT}
    volumes:
      - ollama:/root/.ollama
    entrypoint: ["sh", "-lc"]
    command: ["ollama pull llama3.1:8b-instruct-q4_K_M && ollama pull blaifa/Nanonets-OCR-s"]
    restart: "no"

  web:
    build: .
    init: true
    container_name: flask_web
    gpus: all
    env_file: 
      - .env
      - secret.env
    expose:
      - "${WEB_INTERNAL_PORT}"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_SERVICE_HOST}:${OLLAMA_INTERNAL_PORT}
      - QDRANT_URL=${QDRANT_SERVICE_HOST}:${QDRANT_INTERNAL_PORT}
      - RAG_MODEL_DEVICE=${RAG_MODEL_DEVICE:-cuda}
      - RAG_MAX_WORKERS=${RAG_MAX_WORKERS:-4}
      - DOCS_DIR=${DOCS_DIR}
      - GUNICORN_CMD_ARGS=--access-logfile - --error-logfile - --capture-output --log-level debug
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU}


    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./data:/data
      - hf_cache:/root/.cache/huggingface

  nginx:
    image: nginx:1.27-alpine
    container_name: flask_nginx
    env_file:
      - .env
    depends_on:
      - web
    ports:
      - "${NGINX_HTTP_EXTERNAL_PORT}:${NGINX_HTTP_INTERNAL_PORT}"
      - "${NGINX_HTTPS_EXTERNAL_PORT}:${NGINX_HTTPS_INTERNAL_PORT}"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    command: >
      sh -c "envsubst '$$NGINX_HTTP_INTERNAL_PORT $$WEB_INTERNAL_PORT' < /etc/nginx/templates/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    restart: unless-stopped

  test:
    build: .
    container_name: flask_tests
    working_dir: /app
    command: sh /app/tests/run_tests.sh
    env_file:
      - .env
      - secret.env
    volumes:
      - ./:/app
    environment:
      PYTHONPATH: /app
      OLLAMA_BASE_URL: ${OLLAMA_SERVICE_HOST}:${OLLAMA_INTERNAL_PORT}
      QDRANT_URL: ${QDRANT_SERVICE_HOST}:${QDRANT_INTERNAL_PORT}
      DATABASE_URL: "sqlite:///:memory:"


volumes:
  pgdata:
  qdrantdata:
  ollama:
  hf_cache:
