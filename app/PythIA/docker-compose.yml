services:
  db:
    image: postgres:16
    container_name: flask_db
    env_file:
      - .env
      - secret.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      TZ: Europe/Madrid
      PGTZ: Europe/Madrid
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:${POSTGRES_PORT}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: flask_qdrant
    expose:
      - "${QDRANT_INTERNAL_PORT}"
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.20.7}
    pull_policy: always
    container_name: flask_ollama
    gpus: all
    ports:
      - "${OLLAMA_EXTERNAL_PORT}:${OLLAMA_INTERNAL_PORT}"
    volumes:
      - ollama:/root/.ollama
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      RAG_LLM_MODELS: ${RAG_LLM_MODELS:-llama3.1:8b-instruct-q4_K_M,gemma3:4b,qwen3:4b-instruct}
      OCR_MODEL_NAME: ${OCR_MODEL_NAME:-blaifa/Nanonets-OCR-s}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-lc", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  ollama_ocr:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.20.7}
    pull_policy: always
    container_name: flask_ollama_ocr
    gpus: all
    ports:
      - "${OCR_OLLAMA_EXTERNAL_PORT:-11435}:${OLLAMA_INTERNAL_PORT}"
    volumes:
      - ollama_ocr:/root/.ollama
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OCR_MODEL_NAME: ${OCR_MODEL_NAME:-blaifa/Nanonets-OCR-s}
    command: ["serve"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30

  ollama_ocr_init:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.20.7}
    pull_policy: always
    container_name: flask_ollama_ocr_init
    depends_on:
      ollama_ocr:
        condition: service_started
    volumes:
      - ollama_ocr:/root/.ollama
    environment:
      OCR_MODEL_NAME: ${OCR_MODEL_NAME:-blaifa/Nanonets-OCR-s}
      OLLAMA_HOST: 0.0.0.0:11434
    entrypoint: ["sh", "-lc"]
    command: >
      until ollama list >/dev/null 2>&1; do sleep 1; done;
      echo "[ollama_ocr_init] Pulling OCR model: $$OCR_MODEL_NAME";
      ollama pull "$$OCR_MODEL_NAME";
      echo "[ollama_ocr_init] Done";
      exit 0
    restart: "no"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    init: true
    container_name: flask_web
    gpus: all
    env_file: 
      - .env
      - secret.env
    expose:
      - "${WEB_INTERNAL_PORT}"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama_ocr:
        condition: service_healthy
      ollama_ocr_init:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_SERVICE_HOST}:${OLLAMA_INTERNAL_PORT}
      - OCR_OLLAMA_BASE_URL=${OCR_OLLAMA_SERVICE_HOST:-ollama_ocr}:${OLLAMA_INTERNAL_PORT}
      - QDRANT_URL=${QDRANT_SERVICE_HOST}:${QDRANT_INTERNAL_PORT}
      - RAG_MODEL_DEVICE=${RAG_MODEL_DEVICE:-cpu}
      - RAG_MAX_WORKERS=${RAG_MAX_WORKERS:-4}
      - RAG_LLM_MODEL=${RAG_LLM_MODEL:-llama3.1:8b-instruct-q4_K_M}
      - RAG_LLM_MODELS=${RAG_LLM_MODELS:-llama3.1:8b-instruct-q4_K_M,gemma3:4b,qwen3:4b-instruct}
      - OCR_MODEL_NAME=${OCR_MODEL_NAME:-blaifa/Nanonets-OCR-s}
      - OLLAMA_PULL_TIMEOUT_SECONDS=${OLLAMA_PULL_TIMEOUT_SECONDS:-1800}
      - OLLAMA_PULL_IDLE_TIMEOUT_SECONDS=${OLLAMA_PULL_IDLE_TIMEOUT_SECONDS:-300}
      - OLLAMA_PULL_LOG_INTERVAL_SECONDS=${OLLAMA_PULL_LOG_INTERVAL_SECONDS:-20}
      - DOCS_DIR=${DOCS_DIR}
      - HF_HOME=/home/appuser/.cache/huggingface
      - GUNICORN_CMD_ARGS=--access-logfile - --error-logfile - --capture-output --log-level debug
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU}
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./data:/data
      - hf_cache:/home/appuser/.cache/huggingface
      -  ./app:/app/app
      - ./migrations:/app/migrations

  nginx:
    image: nginx:1.27-alpine
    container_name: flask_nginx
    env_file:
      - .env
    depends_on:
      - web
    ports:
      - "${NGINX_HTTP_EXTERNAL_PORT}:${NGINX_HTTP_INTERNAL_PORT}"
      - "${NGINX_HTTPS_EXTERNAL_PORT}:${NGINX_HTTPS_INTERNAL_PORT}"
    volumes:
      - ./docker/nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    command: >
      sh -c "envsubst '$$NGINX_HTTP_INTERNAL_PORT $$WEB_INTERNAL_PORT' < /etc/nginx/templates/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    restart: unless-stopped

  test:
    profiles:
      - test
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: flask_tests
    working_dir: /app
    command: sh /app/app/test/run_tests.sh
    env_file:
      - .env
      - secret.env
    volumes:
      - ./:/app
    environment:
      PYTHONPATH: /app
      OLLAMA_BASE_URL: ${OLLAMA_SERVICE_HOST}:${OLLAMA_INTERNAL_PORT}
      QDRANT_URL: ${QDRANT_SERVICE_HOST}:${QDRANT_INTERNAL_PORT}
      RAG_LLM_MODEL: ${RAG_LLM_MODEL:-llama3.1:8b-instruct-q4_K_M}
      RAG_LLM_MODELS: ${RAG_LLM_MODELS:-llama3.1:8b-instruct-q4_K_M,gemma3:4b,qwen3:4b-instruct}
      OCR_MODEL_NAME: ${OCR_MODEL_NAME:-blaifa/Nanonets-OCR-s}
      OLLAMA_PULL_TIMEOUT_SECONDS: ${OLLAMA_PULL_TIMEOUT_SECONDS:-1800}
      OLLAMA_PULL_IDLE_TIMEOUT_SECONDS: ${OLLAMA_PULL_IDLE_TIMEOUT_SECONDS:-300}
      OLLAMA_PULL_LOG_INTERVAL_SECONDS: ${OLLAMA_PULL_LOG_INTERVAL_SECONDS:-20}
      DATABASE_URL: "sqlite:///:memory:"


volumes:
  pgdata:
  qdrantdata:
  ollama:
  ollama_ocr:
  hf_cache:
