<!DOCTYPE html>
<html lang="{{ current_locale }}">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ t("auth.forgot_password_title") }}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body class="auth-page">

  <div class="auth-container">
      <h1>{{ t("auth.forgot_password_title") }}</h1>

      <form method="POST">
          {{ form.hidden_tag() }}

          <div class="form-group">
              {{ form.email.label }}
              {{ form.email(class="form-input") }}
              {% for error in form.email.errors %}
                  <p class="error">{{ error }}</p>
              {% endfor %}
          </div>

          {{ form.submit(class="btn btn-primary") }}
      </form>

      <div class="links">
          <a href="{{ url_for('auth.login') }}">{{ t("auth.back_login") }}</a>
      </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/functionalities.js') }}"></script>
</body>
</html>
