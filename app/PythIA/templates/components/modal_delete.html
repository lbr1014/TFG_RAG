<div class="modal fade"
     id="deleteConfirmModal"
     tabindex="-1"
     aria-labelledby="deleteConfirmModalLabel"
     aria-hidden="true">

  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content app-surface delete-modal-panel border-0">

      <div class="modal-header delete-modal-header border-0">
        <div>
          <h1 class="modal-title delete-modal-title" id="deleteConfirmModalLabel">
            Confirmar borrado
          </h1>
          <p class="delete-modal-sub mb-0">
            Esta acción no se puede deshacer.
          </p>
        </div>

        <button type="button"
                class="btn-close btn-close-white"
                data-bs-dismiss="modal"
                aria-label="Cerrar"></button>
      </div>

      <div class="modal-body delete-modal-body">
        ¿Seguro que quieres borrar <strong id="deleteItemName"></strong>?
      </div>

      <div class="modal-footer delete-modal-footer border-0">
        <button type="button"
                class="btn btn-outline-light btn-header"
                data-bs-dismiss="modal">
          Cancelar
        </button>

        <form id="deleteConfirmForm" method="POST" class="d-inline">
          <button type="submit" class="btn btn-danger btn-header">
            Borrar
          </button>
        </form>
      </div>

    </div>
  </div>
</div>
