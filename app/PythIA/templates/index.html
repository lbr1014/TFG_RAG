<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}inicio{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>

  <header class="main-header">
      <div class="user-info">
          <p class="welcome"><strong>{{ titulo}}</strong></p>
          <p class="home-author" style="margin:5px 0 0;">{{ autor }}</p>
      </div>

      <div class="header-actions">
      <a href="{{ url_for('auth.login') }}" class="btn btn-primary">Iniciar sesión</a>
      <a href="{{ url_for('auth.singup') }}" class="btn btn-secondary">Registrarse</a>
    </div>
  </header>

  <div class="page-scroll">
    <main class="main-content">
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/functionalities.js') }}"></script>
</body>
</html>
