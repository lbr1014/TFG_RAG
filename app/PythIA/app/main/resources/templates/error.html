{% extends "base.html" %}

{% block title %}{{ error_title }}{% endblock %}

{% block content %}
  <div class="py-4 py-md-5">
    <section class="app-surface app-error-panel mx-auto text-center">
      <p class="app-error-status mb-2">{{ error_status }}</p>
      <h1 class="mb-3">{{ error_title }}</h1>
      <p class="app-error-message mb-0">{{ error_message }}</p>
    </section>
  </div>
{% endblock %}
